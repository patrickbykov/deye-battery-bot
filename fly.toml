# fly.toml app configuration file generated for deye-battery-bot on 2026-03-06T13:24:14Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'deye-battery-bot'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
